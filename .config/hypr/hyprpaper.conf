splash = false
splash-offset = 2.0

# Preload wallpapers
preload = ~/wall/JIWOO.png
preload = ~/wall/JIWOO2.png

# Set wallpapers per monitor
# Laptop monitor gets JIWOO.png
wallpaper = eDP-1,~/wall/JIWOO.png
# External HDMI gets JIWOO2.png
wallpaper = HDMI-A-1,~/wall/JIWOO2.png
# Fallback for any other monitor
wallpaper = ,~/wall/JIWOO.png
